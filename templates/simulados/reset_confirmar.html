{% extends 'base.html' %}

{% block title %}Limpar Dados - CFG Anbima{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="mb-4">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
    </div>
    <h3 class="fw-bold mb-3">Tem certeza que deseja limpar o histórico?</h3>
    <p class="text-muted mb-4">
        Esta ação irá apagar <strong>todas</strong> as suas tentativas e respostas.<br>
        Esta ação não pode ser desfeita.
    </p>
    <form method="post">
        {% csrf_token %}
        <a href="{% url 'simulados:historico' %}" class="btn btn-outline-secondary me-2">
            <i class="bi bi-arrow-left me-1"></i>Cancelar
        </a>
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>Confirmar Exclusão
        </button>
    </form>
</div>
{% endblock %}
